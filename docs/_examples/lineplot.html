<div id="timeline" style="height: 62px"></div>
<script type="module">
    import { DefaultSidebar, Timeline, LinePlot } from 'https://esm.run/@fqqb/timeline';
    window.addEventListener('load', () => {
        const targetEl = document.getElementById('timeline');
        const timeline = new Timeline(targetEl);
        timeline.leftSidebar = new DefaultSidebar(timeline);

        // BEGIN excerpt-1
        const band1 = new LinePlot(timeline);
        band1.label = 'Plot';
        band1.fill = 'lime';

        const points1 = [];
        for (let x = 0; x < 100; x += 0.01) {
            points1.push({ x, y: Math.sin(x)});
        }

        band1.lines = [{
            points: points1,
            pointRadius: 0,
        }];

        const band2 = new LinePlot(timeline);
        band2.label = 'Step plot';
        band2.fill = 'cyan';

        const points2 = [];
        for (let x = 0; x < 100; x += 0.5) {
            points2.push({x, y: Math.sin(x)});
        }

        band2.lines = [{
            points: points2,
            pointRadius: 0,
            lineStyle: 'step',
        }];
        // END excerpt-1
    });
</script>
